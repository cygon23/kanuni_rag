name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  UV_VERSION: "0.5.11"
  PYTHON_VERSION: "3.12"
  BUN_VERSION: "1.3.9"

jobs:
  # Detects which parts of the monorepo a push/PR actually touches so
  # unrelated jobs (and unrelated Docker image builds) can be skipped
  # instead of always spinning up the whole pipeline.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      web: ${{ steps.filter.outputs.web }}
      migrations: ${{ steps.filter.outputs.migrations }}
      docker_api: ${{ steps.filter.outputs.docker_api }}
      docker_ingestion: ${{ steps.filter.outputs.docker_ingestion }}
      docker_web: ${{ steps.filter.outputs.docker_web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python: &python
              - 'apps/api/**'
              - 'apps/ingestion/**'
              - 'evals/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web: &web
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'bun.lock'
              - 'tsconfig.base.json'
            migrations:
              - 'infra/migrations/**'
            docker_api:
              - *python
              - 'apps/api/Dockerfile'
            docker_ingestion:
              - *python
              - 'apps/ingestion/Dockerfile'
            docker_web:
              - *web
              - 'apps/web/Dockerfile'

  lint-python:
    name: Lint, typecheck (Python)
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format --check
        run: uv run ruff format --check .

      - name: mypy --strict
        run: uv run mypy

  lint-web:
    name: Lint, typecheck, format (web)
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: eslint
        run: bun run --filter kanuni-web lint

      - name: tsc --noEmit
        run: bun run --filter kanuni-web typecheck

      - name: prettier --check
        run: bun run --filter kanuni-web format:check

  unit-tests:
    name: Unit tests (Python)
    needs: [changes, lint-python]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: pytest (unit tests only — integration tests run in the integration-tests job)
        run: >
          uv run pytest --cov --cov-report=term-missing
          --ignore=apps/ingestion/tests/integration
          --ignore=apps/api/tests/integration

  integration-tests:
    name: Integration tests (Postgres + pgvector)
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: kanuni
          POSTGRES_PASSWORD: kanuni
          POSTGRES_DB: kanuni
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U kanuni -d kanuni"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install dbmate
        run: |
          curl -fsSL -o /usr/local/bin/dbmate \
            https://github.com/amacneil/dbmate/releases/latest/download/dbmate-linux-amd64
          chmod +x /usr/local/bin/dbmate

      # tesseract lets the scanned-document fixture (bot-2003-forex-listed-
      # securities.pdf) exercise real OCR here; every other external
      # provider (embedding, metadata-extraction LLM) stays mocked per §13.
      - name: Install tesseract
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-swa

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Run migrations up
        run: dbmate --migrations-dir infra/migrations --no-dump-schema up
        env:
          DATABASE_URL: postgres://kanuni:kanuni@localhost:5432/kanuni?sslmode=disable

      - name: Ingestion + admin API integration tests
        run: uv run pytest apps/ingestion/tests/integration apps/api/tests/integration -v
        env:
          KANUNI_DATABASE_URL: postgres://kanuni:kanuni@localhost:5432/kanuni

      - name: Roll migrations back (down path must work — PROJECT_SPEC.md §12)
        run: dbmate --migrations-dir infra/migrations --no-dump-schema down
        env:
          DATABASE_URL: postgres://kanuni:kanuni@localhost:5432/kanuni?sslmode=disable

  security:
    name: Secret scan and dependency audit
    needs: changes
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Secret scanning runs on every push regardless of which paths changed —
      # it's cheap and a leaked secret in any file matters.
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up uv
        if: needs.changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        if: needs.changes.outputs.python == 'true'
        run: uv sync --all-packages

      - name: pip-audit
        if: needs.changes.outputs.python == 'true'
        run: |
          uv export --format requirements-txt --no-hashes > /tmp/requirements.txt
          uvx pip-audit -r /tmp/requirements.txt

      - name: Set up bun
        if: needs.changes.outputs.web == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install JS dependencies
        if: needs.changes.outputs.web == 'true'
        run: bun install --frozen-lockfile

      - name: bun audit
        if: needs.changes.outputs.web == 'true'
        run: bun audit --audit-level=high

  fresh-clone-setup:
    name: Fresh-clone make setup
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: make setup
        run: make setup

  # Each image only builds when the files it actually depends on changed —
  # a web-only PR never pays for an api/ingestion image build, and vice versa.
  docker-build-api:
    name: Docker build (api)
    needs: changes
    if: needs.changes.outputs.docker_api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build api image
        run: docker build -f apps/api/Dockerfile -t kanuni-api:ci .

  docker-build-ingestion:
    name: Docker build (ingestion)
    needs: changes
    if: needs.changes.outputs.docker_ingestion == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ingestion image
        run: docker build -f apps/ingestion/Dockerfile -t kanuni-ingestion:ci .

  docker-build-web:
    name: Docker build (web)
    needs: changes
    if: needs.changes.outputs.docker_web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build web image
        run: docker build -f apps/web/Dockerfile -t kanuni-web:ci .
