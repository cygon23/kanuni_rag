services:
  db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kanuni}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kanuni}
      POSTGRES_DB: ${POSTGRES_DB:-kanuni}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanuni} -d ${POSTGRES_DB:-kanuni}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: amacneil/dbmate
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kanuni}:${POSTGRES_PASSWORD:-kanuni}@db:5432/${POSTGRES_DB:-kanuni}?sslmode=disable
    volumes:
      - ./infra/migrations:/db/migrations
    command: ["--wait", "up"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Dockerfile's CMD is the production default (no --reload); add it
    # back here for local dev, so the deployed image and the dev command
    # only differ by this one flag.
    command:
      [
        "uv",
        "run",
        "--project",
        "/workspace/apps/api",
        "uvicorn",
        "kanuni_api.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/workspace/apps/api/src",
      ]
    env_file: .env
    environment:
      # Overrides .env's KANUNI_DATABASE_URL: `make dev` always uses this
      # local `db` service, regardless of what's in .env (e.g. a real
      # Supabase URL for other tooling) — SUPABASE_URL/
      # SUPABASE_SERVICE_ROLE_KEY still come from .env (env_file above)
      # for document storage, which has no local-container equivalent.
      KANUNI_DATABASE_URL: postgresql://${POSTGRES_USER:-kanuni}:${POSTGRES_PASSWORD:-kanuni}@db:5432/${POSTGRES_DB:-kanuni}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src:/workspace/apps/api/src
      - ./apps/api/tests:/workspace/apps/api/tests
      - ./sources.yaml:/workspace/apps/api/sources.yaml

  ingestion:
    build:
      context: .
      dockerfile: apps/ingestion/Dockerfile
    env_file: .env
    environment:
      KANUNI_DATABASE_URL: postgresql://${POSTGRES_USER:-kanuni}:${POSTGRES_PASSWORD:-kanuni}@db:5432/${POSTGRES_DB:-kanuni}
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./apps/ingestion/src:/workspace/apps/ingestion/src
      - ./apps/ingestion/tests:/workspace/apps/ingestion/tests
      - ./sources.yaml:/workspace/apps/ingestion/sources.yaml

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env
    environment:
      # Docker network service name, not localhost — apps/web's proxy
      # routes (src/app/api/*/route.ts) run server-side, inside this
      # container, and reach the api service the same way api reaches db.
      # KANUNI_API_KEY comes from .env (see .env.example's Phase 5
      # section and docs/NEEDS.md for how to create one).
      KANUNI_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web/src:/workspace/apps/web/src
      - ./apps/web/public:/workspace/apps/web/public
    depends_on:
      - api

volumes:
  pgdata:
